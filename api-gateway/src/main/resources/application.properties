spring.application.name=api-gateway
server.port=8085

spring.cloud.gateway.server.webmvc.discovery.locator.enabled=true
spring.cloud.gateway.server.webmvc.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.server.webmvc.routes[0].id=auth-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://auth-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.server.webmvc.routes[1].id=soil-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://soil-service
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/soil/**

spring.cloud.gateway.server.webmvc.routes[2].id=control-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://control-service
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/control/**

spring.cloud.gateway.server.webmvc.routes[3].id=temperature-service
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://temperature-service
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/temperature/**

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://eureka-service:8761/eureka/}
eureka.instance.prefer-ip-address=true

gateway.cors.allowed-origin-patterns=${GATEWAY_CORS_ALLOWED_ORIGIN_PATTERNS:http://34.231.237.42:*,http://34.231.237.42:8085,http://localhost:*,http://127.0.0.1:*}

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=api-gateway
