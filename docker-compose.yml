services:
  mysql:
    image: mysql:8.4
    container_name: chili-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-chili_root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-chili_track}
      TZ: ${APP_TIME_ZONE:-UTC}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: chili-phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: ${PHPMYADMIN_UPLOAD_LIMIT:-64M}
      TZ: ${APP_TIME_ZONE:-UTC}
    ports:
      - "${PHPMYADMIN_HOST_PORT:-8080}:80"

  eureka-service:
    build:
      context: ./eureka-service
      dockerfile: ../docker/Dockerfile.spring-boot
    image: chili-eureka-service:local
    container_name: chili-eureka-service
    restart: unless-stopped
    environment:
      TZ: ${APP_TIME_ZONE:-UTC}
      JAVA_TOOL_OPTIONS: -Duser.timezone=${APP_TIME_ZONE:-UTC}
    ports:
      - "${EUREKA_HOST_PORT:-8761}:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  auth-service:
    build:
      context: ./auth-service
      dockerfile: ../docker/Dockerfile.spring-boot
    image: chili-auth-service:local
    container_name: chili-auth-service
    restart: unless-stopped
    depends_on:
      eureka-service:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      TZ: ${APP_TIME_ZONE:-UTC}
      JAVA_TOOL_OPTIONS: -Duser.timezone=${APP_TIME_ZONE:-UTC}
      SPRING_DATASOURCE_URL: ${AUTH_DATASOURCE_URL:-jdbc:mysql://mysql:3306/chili_auth?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-chili_root_password}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:-http://eureka-service:8761/eureka/}
      JWT_SECRET: ${JWT_SECRET:-chilitrack-secret-chilitrack-secret}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
    ports:
      - "${AUTH_HOST_PORT:-8084}:8084"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8084/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  soil-service:
    build:
      context: ./soil-service
      dockerfile: ../docker/Dockerfile.spring-boot
    image: chili-soil-service:local
    container_name: chili-soil-service
    restart: unless-stopped
    depends_on:
      eureka-service:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      TZ: ${APP_TIME_ZONE:-UTC}
      JAVA_TOOL_OPTIONS: -Duser.timezone=${APP_TIME_ZONE:-UTC}
      SPRING_DATASOURCE_URL: ${CHILI_TRACK_DATASOURCE_URL:-jdbc:mysql://mysql:3306/chili_track?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-chili_root_password}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:-http://eureka-service:8761/eureka/}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
    ports:
      - "${SOIL_HOST_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  control-service:
    build:
      context: ./control-service
      dockerfile: ../docker/Dockerfile.spring-boot
    image: chili-control-service:local
    container_name: chili-control-service
    restart: unless-stopped
    depends_on:
      eureka-service:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      TZ: ${APP_TIME_ZONE:-UTC}
      JAVA_TOOL_OPTIONS: -Duser.timezone=${APP_TIME_ZONE:-UTC}
      SPRING_DATASOURCE_URL: ${CONTROL_DATASOURCE_URL:-jdbc:mysql://mysql:3306/chili_control?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-chili_root_password}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:-http://eureka-service:8761/eureka/}
      JWT_SECRET: ${JWT_SECRET:-chilitrack-secret-chilitrack-secret}
    ports:
      - "${CONTROL_HOST_PORT:-8082}:8082"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  temperature-service:
    build:
      context: ./temperature-service
      dockerfile: ../docker/Dockerfile.spring-boot
    image: chili-temperature-service:local
    container_name: chili-temperature-service
    restart: unless-stopped
    depends_on:
      eureka-service:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      TZ: ${APP_TIME_ZONE:-UTC}
      JAVA_TOOL_OPTIONS: -Duser.timezone=${APP_TIME_ZONE:-UTC}
      SPRING_DATASOURCE_URL: ${CHILI_TRACK_DATASOURCE_URL:-jdbc:mysql://mysql:3306/chili_track?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-chili_root_password}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:-http://eureka-service:8761/eureka/}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
    ports:
      - "${TEMPERATURE_HOST_PORT:-8083}:8083"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8083/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: ../docker/Dockerfile.spring-boot
    image: chili-api-gateway:local
    container_name: chili-api-gateway
    restart: unless-stopped
    depends_on:
      eureka-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      soil-service:
        condition: service_healthy
      control-service:
        condition: service_healthy
      temperature-service:
        condition: service_healthy
    environment:
      TZ: ${APP_TIME_ZONE:-UTC}
      JAVA_TOOL_OPTIONS: -Duser.timezone=${APP_TIME_ZONE:-UTC}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:-http://eureka-service:8761/eureka/}
      GATEWAY_CORS_ALLOWED_ORIGIN_PATTERNS: ${GATEWAY_CORS_ALLOWED_ORIGIN_PATTERNS:-http://chilitrack.online,http://chilitrack.online:8085,http://www.chilitrack.online,http://www.chilitrack.online:8085,https://chilitrack.online,https://www.chilitrack.online,http://34.231.237.42:*,http://localhost:*,http://127.0.0.1:*}
    ports:
      - "${API_GATEWAY_HOST_PORT:-8085}:8085"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8085/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: chili-prometheus
    restart: unless-stopped
    depends_on:
      eureka-service:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      soil-service:
        condition: service_healthy
      control-service:
        condition: service_healthy
      temperature-service:
        condition: service_healthy
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    environment:
      TZ: ${APP_TIME_ZONE:-UTC}
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  grafana:
    image: grafana/grafana:11.4.0
    container_name: chili-grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      TZ: ${APP_TIME_ZONE:-UTC}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql_data:
  prometheus_data:
  grafana_data:
